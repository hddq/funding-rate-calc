name: CI

on:
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Check types and syntax
        run: pnpm run check

      - name: Build
        run: pnpm run build
